<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="shortcut icon" href="/static/img/logo.png" type="image/x-icon">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 7vh;
            margin-top: -1vh;
        }

        .form-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 400px;
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Estilos para el botón */
        .submit-btn {
            background-color: #007bff; /* Color de fondo normal (azul) */
            border-color: #007bff; /* Borde del mismo color */
            color: white; /* Color del texto blanco */
            padding: 10px 10px; /* Tamaño adecuado del botón */
            font-size: 10px; /* Tamaño del texto */
            font-weight: bold;
            border-radius: 8px; /* Bordes redondeados */
            transition: all 0.6s ease-in-out; /* Transición suave para todos los cambios */
            width: 60%; /* Asegura que el botón ocupe todo el ancho disponible */
            text-align: center; /* Asegura que el texto esté centrado */
            display: inline-block; /* Asegura que el botón se comporte como un bloque */
        }

        /* Efecto al pasar el cursor sobre el botón */
        .submit-btn:hover {
            background-color: #0056b3; /* Color de fondo más oscuro */
            border-color: #004085; /* Color de borde más oscuro */
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2); /* Sombra más pronunciada */
            cursor: pointer; /* Cambia el cursor a mano */
            transform: scale(1.05);
        }

        /* Efecto al hacer clic (presionado) */
        .submit-btn:active {
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1); /* Sombra más suave al hacer clic */
        }

        /* Efecto al estar deshabilitado */
        .submit-btn:disabled {
            background-color: #ccc; /* Color de fondo gris cuando está deshabilitado */
            border-color: #ccc; /* Color de borde gris */
            cursor: not-allowed; /* Cursor indicando que está deshabilitado */
        }

        /* --- Caja de Información Mejorada --- */
        .info-box {
            background: rgba(18, 26, 44, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px;
            padding: 25px;
            margin-top: 30px;
            margin-bottom: 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(37, 117, 252, 0.1);
            border: 1px solid rgba(77, 166, 255, 0.25);
            text-align: center;
        }

        .info-box .premio-title {
            font-size: 1.4rem;
            color: #0d8fc7;
            font-weight: 800;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-box .precio-alert {
            font-size: 1.1rem;
            font-weight: 800;
            color: #dc3545;
            background-color: #ffeaea;
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .info-box .cartones-info {
            font-size: 1.2rem;
            color: #f8f9fa;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 15px;
        }

        .info-section {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
            color: #f8f9fa;
        }

        .info-section h4 {
            color: #0d8fc7;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 15px;
            font-size: 1rem;
        }

        .data-grid strong {
            color: #555;
            text-align: left;
        }

        .data-grid span {
            color: #111;
            font-weight: 600;
            text-align: left;
        }

        input {
            margin-bottom: 20px;
            width: 100%;
            border-radius: 10px; /* Bordes más redondeados */
            height: 40px; /* Mayor altura para un aspecto más elegante */
            border: 2px solid #ddd; /* Borde sutil y suave */
            background-color: #f9f9f9; /* Fondo suave */
            font-size: 16px; /* Tamaño de fuente adecuado */
            transition: all 0.3s ease-in-out; /* Transición suave para el enfoque */
        }

        /* Estilo para cuando el input está enfocado */
        input:focus {
            border-color: #28a745; /* Cambia el color del borde al enfocarse */
            box-shadow: 0 0 8px rgba(40, 167, 69, 0.4); /* Efecto de sombra cuando está enfocado */
            background-color: #fff; /* Cambia el fondo a blanco al enfocarse */
            outline: none; /* Quita el borde predeterminado del navegador */
        }
    </style>
</head>
<body>
    <center>
        <img src="static/img/logo.png" style="width: 30%; margin-top: 1vh;margin-bottom: -1vh;" alt="">

        <div class="info-box">
            <p class="premio-title">{{ premio }}</p>
            <div class="precio-alert">Cada cartón cuesta {{ precio }} Bs</div>
            <p class="cartones-info">Cantidad de cartones: <span style="color:#4da6ff;">{{ cartones_seleccionados.split(',') | length if cartones_seleccionados else 0 }}</span></p>



            <div class="info-section">
                <h4><span style="font-size: 1.2rem;">📱</span> Pago Móvil</h4>
                <div class="data-grid">
                    <strong>Banco:</strong>
                    <span></span>

                    <strong>Teléfono:</strong>
                    <span></span>

                    <strong>C.I:</strong>
                    <span>V</span>
                </div>
            </div>
        </div>

        <h2 style="color: whitesmoke;">Total a pagar: {{ total_price }} Bs</h2>

        <h3 style="color: rgb(43, 158, 235); font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">BINGO DEL DIA: {{ enunciado }}</h3>

        <form id="compraForm" action="" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <input type="text" class="form-control" style="width: 90%;" id="nombre" name="nombre" required placeholder="Nombre y Apellido">
            </div>

            <div class="mb-3">
                <input type="number" class="form-control" style="width: 90%;" id="cedula" name="cedula" required placeholder="Cédula de Identidad" min="0">
            </div>

            <div class="mb-3">
                <select id="codigo_pais" class="form-select" style="width: 30%; margin-right: 60%;" required>
                    <option value="+58" selected>🇻🇪 +58 (Venezuela)</option>
                    <option value="+1">🇺🇸 +1 (Estados Unidos)</option>
                    <option value="+57">🇨🇴 +57 (Colombia)</option>
                    <option value="+51">🇵🇪 +51 (Perú)</option>
                    <option value="+56">🇨🇱 +56 (Chile)</option>
                    <option value="+593">🇪🇨 +593 (Ecuador)</option>
                    <option value="+39">🇮🇹 +39 (Italia)</option>
                    <option value="+52">🇲🇽 +52 (México)</option>
                </select>
                <input type="number" class="form-control" style="width: 90%;" id="telefono" placeholder="Número Telefónico" required>
            </div>

            <input type="hidden" id="telefono_completo" name="telefono">

            <label style="color: white;" for="referencia" class="form-label">Subir comprobante de pago</label>
            <div class="mb-3">
                <input type="file" class="form-control" style="width: 30%;" id="referencia" name="referencia" required accept=".png, .jpg, .jpeg">
            </div>

            <input type="hidden" name="cartones_seleccionados" value="{{ cartones_seleccionados }}">
            <input type="hidden" name="total_price" value="{{ total_price }}">
            <input type="hidden" name="total_price_2" value="{{ total_price2 }}">

            <button type="submit" style="font-size: large;" class="btn submit-btn">Confirmar compra</button>
        </form>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const compraForm = document.getElementById("compraForm");
                const venta = "{{ venta }}"; // Aseguramos que se pase como string

                // Cambiar el action dinámicamente
                if (venta === "dos") {
                    compraForm.action = "/registrar_compra2";
                } else {
                    compraForm.action = "/registrar_compra";
                }

                // Listener para el evento submit del formulario
                compraForm.addEventListener("submit", function() {
                    // Asegura que el teléfono completo se actualice antes de enviar
                    actualizarTelefonoCompleto();
                });
            });
        </script>

        <script>
            // Define el tiempo de expiración en 25 minutos (en milisegundos)
            const tiempoExpiracion = 25 * 60 * 1000;

            // Inicia un temporizador
            setTimeout(function() {
                const venta = "{{ venta }}"; // Aseguramos que se pase como string

                if (venta === "dos") {
                    window.location.href = "/cartones2";
                } else {
                    window.location.href = "/cartones";
                }
            }, tiempoExpiracion);
        </script>
    </center>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybP5akQ6gMv5BXkL0M6tn7fFksz9Hg9xW1WkT7WqO8lq3t7E2f" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js" integrity="sha384-pzjw8f+ua7Kw1TIq0s1FhQya5m7ZGkC9Ydu2LJlfUqtJfeXusKhD2g5QbQ5h0Bz6Y" crossorigin="anonymous"></script>
    <script>
        document.getElementById("telefono").addEventListener("input", function () {
            actualizarTelefonoCompleto();
        });

        document.getElementById("codigo_pais").addEventListener("change", function () {
            actualizarTelefonoCompleto();
        });

        function actualizarTelefonoCompleto() {
            const codigoPais = document.getElementById("codigo_pais").value;
            const telefono = document.getElementById("telefono").value;
            const telefonoCompleto = `${codigoPais}${telefono}`;
            document.getElementById("telefono_completo").value = telefonoCompleto;
        }
    </script>
</body>
</html>
